name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example: 0.1.4"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || '' }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Read project version
        id: project
        run: |
          version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate manual publish version
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.version }}" != "${{ steps.project.outputs.version }}" ]; then
            echo "Requested version ${{ inputs.version }} does not match pyproject.toml version ${{ steps.project.outputs.version }}." >&2
            echo "Merge the matching release PR before publishing." >&2
            exit 1
          fi

      - name: Build and smoke-test release artifacts
        run: ./scripts/check-release.sh

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: uv publish --trusted-publishing automatic dist/*

      - name: Restart Hugging Face Space
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret is not configured; skipping Space restart."
            exit 0
          fi
          uv run python - <<'PY'
          from huggingface_hub import HfApi

          HfApi().restart_space("evalstate/hf-agentfinder")
          PY

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version || steps.project.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${tag}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi
