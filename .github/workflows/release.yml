name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to commit before publishing"
        required: true
        default: patch
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      confirm:
        description: "Type 'release' to publish from main"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Confirm manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Manual releases must be run from main, got ${GITHUB_REF}." >&2
            exit 1
          fi
          if [ "${{ inputs.confirm }}" != "release" ]; then
            echo "Manual releases require confirm=release." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Bump release version
        if: github.event_name == 'workflow_dispatch' && inputs.bump != 'none'
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python scripts/bump-version.py --bump "$BUMP"
          uv lock

          version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: release ${version}"
          git push origin HEAD:main

      - name: Read project version
        id: project
        run: |
          version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build and smoke-test release artifacts
        run: ./scripts/check-release.sh

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: uv publish --trusted-publishing automatic dist/*

      - name: Restart Hugging Face Space
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret is not configured; skipping Space restart."
            exit 0
          fi
          uv run python - <<'PY'
          import tomllib

          from huggingface_hub import HfApi

          with open("hf-discover.toml", "rb") as settings:
              space = tomllib.load(settings)["space"]

          api = HfApi()
          api.add_space_variable(
              space["id"],
              "DISCOVER_PUBLIC_BASE_URL",
              space["public_base_url"].rstrip("/"),
          )
          api.restart_space(space["id"])
          PY

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.project.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${tag}" \
              --generate-notes \
              --target "$(git rev-parse HEAD)"
          fi
